<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Ctext x='50' y='70' font-family='system-ui' font-size='50' font-weight='600' fill='%23fff' text-anchor='middle'%3E⚽%3C/text%3E%3C/svg%3E">
  <title>Live Score</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Live Scores</h1>
      <div class="date-indicator" id="dateDisplay"></div>
    </header>
    <main class="content">
      <div class="status-bar" id="statusBar">
        <span id="lastUpdated"></span>
        <div class="live-badge" id="liveIndicator">● LIVE</div>
      </div>
      <div class="matches-container" id="matchesContainer">
        <div class="loading-state">Loading matches...</div>
      </div>
    </main>
    <div class="error-toast" id="errorToast"></div>
  </div>
<script src="api.js"></script>
<script src="script.js"></script>
</body>
</html>
