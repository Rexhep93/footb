<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pitch">
  <meta name="theme-color" content="#0a0a0f">
  <title>Pitch</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Status bar spacer for iOS -->
  <div class="status-bar-spacer"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="app-logo">Pitch</div>
      <div class="header-right">
        <button class="icon-btn refresh-btn" id="refreshBtn" title="Vernieuwen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- League filter tabs -->
    <div class="league-tabs" id="leagueTabs">
      <button class="tab-btn active" data-league="all">Alles</button>
      <button class="tab-btn" data-league="PL">Premier League</button>
      <button class="tab-btn" data-league="DED">Eredivisie</button>
      <button class="tab-btn" data-league="CL">Champions League</button>
      <button class="tab-btn" data-league="BL1">Bundesliga</button>
      <button class="tab-btn" data-league="PD">La Liga</button>
      <button class="tab-btn" data-league="SA">Serie A</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="main-content" id="mainContent">

    <!-- Loading state -->
    <div class="loading-state" id="loadingState">
      <div class="loading-pulse">
        <div class="pulse-ring"></div>
        <div class="pulse-dot"></div>
      </div>
      <p class="loading-text">Wedstrijden laden…</p>
    </div>

    <!-- Error state -->
    <div class="error-state hidden" id="errorState">
      <div class="error-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="error-text">Kan wedstrijden niet laden</p>
      <button class="retry-btn" id="retryBtn">Opnieuw proberen</button>
    </div>

    <!-- Matches list -->
    <div class="matches-container hidden" id="matchesContainer">
      <!-- Live section -->
      <div class="section-block" id="liveSection">
        <div class="section-label">
          <span class="live-indicator"></span>
          Live
        </div>
        <div class="matches-list" id="liveMatches"></div>
      </div>

      <!-- Today section -->
      <div class="section-block" id="todaySection">
        <div class="section-label">Vandaag</div>
        <div class="matches-list" id="todayMatches"></div>
      </div>

      <!-- Finished section -->
      <div class="section-block" id="finishedSection">
        <div class="section-label">Gespeeld</div>
        <div class="matches-list" id="finishedMatches"></div>
      </div>

      <!-- No matches message -->
      <div class="empty-state hidden" id="emptyState">
        <p>Geen wedstrijden gevonden</p>
      </div>
    </div>

  </main>

  <!-- Match detail panel (slides up) -->
  <div class="detail-overlay hidden" id="detailOverlay">
    <div class="detail-backdrop" id="detailBackdrop"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-handle"></div>

      <!-- Detail header -->
      <div class="detail-header" id="detailHeader">
        <button class="close-btn" id="closeBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
        <div class="detail-league" id="detailLeague"></div>
      </div>

      <!-- Score hero -->
      <div class="score-hero" id="scoreHero">
        <div class="team-block home">
          <div class="team-crest" id="homeCrest"></div>
          <div class="team-name" id="homeTeam"></div>
        </div>
        <div class="score-center">
          <div class="score-display" id="scoreDisplay"></div>
          <div class="match-status" id="matchStatus"></div>
        </div>
        <div class="team-block away">
          <div class="team-crest" id="awayCrest"></div>
          <div class="team-name" id="awayTeam"></div>
        </div>
      </div>

      <!-- Intensity bar -->
      <div class="intensity-section" id="intensitySection">
        <div class="intensity-label">
          <span>Wedstrijdintensiteit</span>
          <span class="intensity-value" id="intensityValue">—</span>
        </div>
        <div class="intensity-track">
          <div class="intensity-fill" id="intensityFill"></div>
        </div>
        <div class="intensity-desc" id="intensityDesc"></div>
      </div>

      <!-- Timeline -->
      <div class="timeline-section">
        <div class="timeline-header">Wedstrijdverhaal</div>
        <div class="timeline-feed" id="timelineFeed">
          <div class="timeline-empty">Nog geen gebeurtenissen</div>
        </div>
      </div>

      <!-- Stats section -->
      <div class="stats-section hidden" id="statsSection">
        <div class="stats-header">Statistieken</div>
        <div class="stats-grid" id="statsGrid"></div>
      </div>

    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="today">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Vandaag</span>
    </button>
    <button class="nav-btn" data-view="favorites">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span>Favorieten</span>
    </button>
    <button class="nav-btn" data-view="standings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>Stand</span>
    </button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
