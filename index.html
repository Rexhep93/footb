<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111111">
    <title>Scores</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/script.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>⚽ Scores</h1>
            <div class="header-right">
                <span id="last-updated" class="timestamp"></span>
                <button id="refresh-btn" aria-label="Vernieuwen">↻</button>
            </div>
        </div>
        <div class="tabs">
            <button class="tab active" data-filter="all">Vandaag</button>
            <button class="tab" data-filter="live">Live</button>
        </div>
    </header>

    <main>
        <div id="matches-list" class="matches"></div>
        <div id="empty-state" class="empty hidden">
            <p>Geen wedstrijden vandaag</p>
        </div>
    </main>

    <div id="toast" class="toast hidden"></div>
</body>
</html>
