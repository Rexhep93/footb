<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pitch">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="style.css">
<title>Pitch</title>
</head>
<body>

<div class="ambient">
  <div class="ambient-blob a"></div>
  <div class="ambient-blob b"></div>
  <div class="ambient-blob c"></div>
</div>

<header id="topbar">
  <div class="topbar-bg"></div>
  <div class="topbar-row">
    <h1 class="title-large">Pitch</h1>
    <button class="icon-btn" aria-label="Profiel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.8"/><path d="M4.5 21c0-4.2 3.4-7.5 7.5-7.5s7.5 3.3 7.5 7.5"/></svg>
    </button>
  </div>
  <nav id="dateNav" aria-label="Datum"></nav>
  <div id="filterRow">
    <button class="chip active" data-filter="all">Alle</button>
    <button class="chip" data-filter="live">
      <span class="live-dot"></span>Live
    </button>
    <button class="chip" data-filter="fav">Favorieten</button>
  </div>
</header>

<main id="app">
  <div id="skeleton">
    <div class="skel-comp">
      <div class="skel-head"></div>
      <div class="skel-card">
        <div class="skel-row"></div>
        <div class="skel-row"></div>
        <div class="skel-row"></div>
      </div>
    </div>
    <div class="skel-comp">
      <div class="skel-head"></div>
      <div class="skel-card">
        <div class="skel-row"></div>
        <div class="skel-row"></div>
      </div>
    </div>
  </div>
</main>

<nav id="tabbar" aria-label="Hoofdnavigatie">
  <div class="tabbar-bg"></div>
  <button class="tab active" data-tab="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3.5"/><path d="M16 3v4M8 3v4M3.5 10h17"/></svg>
    <span>Vandaag</span>
  </button>
  <button class="tab" data-tab="live">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/></svg>
    <span>Live</span>
  </button>
  <button class="tab" data-tab="leagues">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v4a5 5 0 0 1-10 0V4Z"/><path d="M17 4h2.5a2 2 0 0 1 0 4H17M7 4H4.5a2 2 0 0 0 0 4H7M9 14v3M15 14v3M7 20h10"/></svg>
    <span>Competities</span>
  </button>
  <button class="tab" data-tab="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
    <span>Zoeken</span>
  </button>
</nav>

<script type="module" src="script.js"></script>
</body>
</html>
